<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RHPG — {% block title %}Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --bg:      #f5f6fa;
      --s1:      #ffffff;
      --s2:      #f0f1f8;
      --s3:      #e6e8f5;
      --border:  #dde0ef;
      --accent:  #5b4de8;
      --accent2: #0a84e8;
      --high:    #00a878;
      --neutral: #6b7a8d;
      --low:     #d63557;
      --text:    #1a1d2e;
      --muted:   #8491a5;
      --sidebar: #1e2140;
      --sidebar-item: rgba(255,255,255,0.07);
      --sidebar-active: rgba(255,255,255,0.13);
      --sidebar-text: #c8cde8;
      --sidebar-muted: #6a7090;
    }

    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; min-height: 100vh; }

    /* ── Sidebar (dark stays) ── */
    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: 220px;
      background: var(--sidebar);
      display: flex; flex-direction: column; z-index: 100;
    }
    .sidebar-brand { padding: 1.4rem 1.5rem 1rem; border-bottom: 1px solid rgba(255,255,255,.07); }
    .sidebar-brand .logo {
      font-size: 1.25rem; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(135deg, #a78bfa, #60cdff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-brand .sub { font-size: .68rem; color: var(--sidebar-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-nav { padding: .9rem .7rem; flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .nav-item-side {
      display: flex; align-items: center; gap: .75rem;
      padding: .58rem .9rem; border-radius: 8px; cursor: pointer;
      text-decoration: none; color: var(--sidebar-muted); font-size: .86rem;
      transition: background .15s, color .15s;
    }
    .nav-item-side:hover { background: var(--sidebar-item); color: var(--sidebar-text); }
    .nav-item-side.active { background: var(--sidebar-active); color: #fff; }
    .nav-item-side.active i { color: #a78bfa; }
    .nav-item-side i { font-size: .95rem; width: 18px; text-align: center; }
    .sidebar-footer { padding: .9rem 1.4rem; border-top: 1px solid rgba(255,255,255,.06); }
    .sidebar-footer small { color: var(--sidebar-muted); font-size: .7rem; }

    /* ── Main ── */
    .main { margin-left: 220px; padding: 1.75rem 2rem 2rem; min-height: 100vh; }

    /* ── Page header ── */
    .page-header { margin-bottom: 1.5rem; }
    .page-header h4 { font-size: 1.2rem; font-weight: 700; margin: 0 0 3px; color: var(--text); }
    .page-header p { color: var(--muted); font-size: .83rem; margin: 0; }

    /* ── Cards ── */
    .card { background: var(--s1); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .card-header {
      background: var(--s2); border-bottom: 1px solid var(--border);
      border-radius: 14px 14px 0 0 !important;
      padding: .65rem 1.1rem; font-size: .75rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
      display: flex; align-items: center; gap: .5rem;
    }
    .card-header i { color: var(--accent); font-size: .85rem; }
    .card-body { padding: 1rem; }

    /* ── Stat tiles ── */
    .stat-tile {
      background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.1rem 1.3rem; box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .stat-tile .value { font-size: 2rem; font-weight: 800; line-height: 1; }
    .stat-tile .label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
    .stat-tile .trend { font-size: .74rem; margin-top: .45rem; color: var(--muted); }

    /* ── Table ── */
    .table { color: var(--text); font-size: .85rem; }
    .table thead th { color: var(--muted); border-color: var(--border); font-size: .7rem; text-transform: uppercase; letter-spacing: .6px; padding: .7rem 1rem; font-weight: 700; background: var(--s2); }
    .table tbody td { border-color: var(--border); padding: .65rem 1rem; vertical-align: middle; }
    .table tbody tr:hover td { background: var(--s2); }

    /* ── Badges ── */
    .badge-high    { background: #d1f5eb; color: #00855e; border: 1px solid #a3e9d1; border-radius: 20px; padding: 3px 10px; font-size: .73rem; font-weight: 600; }
    .badge-neutral { background: #eef0f5; color: #6b7a8d; border: 1px solid #d8dce8; border-radius: 20px; padding: 3px 10px; font-size: .73rem; font-weight: 600; }
    .badge-low     { background: #fde8ee; color: #b52040; border: 1px solid #f5b8c8; border-radius: 20px; padding: 3px 10px; font-size: .73rem; font-weight: 600; }

    /* ── Score bar ── */
    .score-bar { height: 5px; border-radius: 3px; background: var(--s3); overflow: hidden; min-width: 80px; }
    .score-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }

    /* ── Buttons ── */
    .btn-primary-custom {
      background: linear-gradient(135deg, #5b4de8, #7c6cf5);
      color: #fff; border: none; border-radius: 9px; padding: .55rem 1.4rem;
      font-size: .85rem; font-weight: 600; cursor: pointer; transition: opacity .2s;
      box-shadow: 0 2px 12px rgba(91,77,232,.3);
    }
    .btn-primary-custom:hover { opacity: .85; }
    .btn-primary-custom:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost {
      background: var(--s1); color: var(--text); border: 1px solid var(--border);
      border-radius: 9px; padding: .45rem 1rem; font-size: .82rem; cursor: pointer;
    }
    .btn-ghost:hover { background: var(--s2); }

    /* ── Rank ── */
    .rank { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700; }
    .rank-1 { background: #fff3cd; color: #a07800; }
    .rank-2 { background: #f0f0f0; color: #707070; }
    .rank-3 { background: #ffe4cc; color: #9a4d00; }
    .rank-n { background: var(--s3); color: var(--muted); }

    /* ── Toast ── */
    #toasts { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; }
    .toast-item { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: .7rem 1.1rem; font-size: .84rem; display: flex; align-items: center; gap: .6rem; min-width: 240px; box-shadow: 0 4px 20px rgba(0,0,0,.1); animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .spinner-sm { width:14px; height:14px; border:2px solid var(--border); border-top-color: var(--accent); border-radius:50%; animation: spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">RHPG</div>
    <div class="sub">Relationship Graph</div>
  </div>
  <nav class="sidebar-nav">
    <a href="/dashboard" class="nav-item-side {% if page=='dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="/dashboard/workers" class="nav-item-side {% if page=='workers' %}active{% endif %}">
      <i class="bi bi-people"></i> Colaboradores
    </a>
    <a href="/dashboard/candidates" class="nav-item-side {% if page=='candidates' %}active{% endif %}">
      <i class="bi bi-person-check"></i> Candidaturas
    </a>
    <a href="/dashboard/groups" class="nav-item-side {% if page=='groups' %}active{% endif %}">
      <i class="bi bi-kanban"></i> Equipes
    </a>
    <a href="/dashboard/network" class="nav-item-side {% if page=='network' %}active{% endif %}">
      <i class="bi bi-diagram-3"></i> Rede
    </a>
    <a href="/dashboard/hypergraph" class="nav-item-side {% if page=='hypergraph' %}active{% endif %}">
      <i class="bi bi-intersect"></i> Hipergrafo
    </a>
    <a href="/docs" target="_blank" class="nav-item-side" style="margin-top:auto">
      <i class="bi bi-code-square"></i> API Docs
    </a>
  </nav>
  <div class="sidebar-footer"><small>v0.1.0 · HR Analysis</small></div>
</aside>

<main class="main">{% block content %}{% endblock %}</main>

<div id="toasts"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.32.0/plotly.min.js"></script>
<script>
function toast(msg, type = 'ok') {
  const color = type === 'ok' ? '#00a878' : '#d63557';
  const icon  = type === 'ok' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill';
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.style.borderLeft = `3px solid ${color}`;
  el.innerHTML = `<i class="bi ${icon}" style="color:${color}"></i><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
